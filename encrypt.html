<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AES Encryption</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>

body{
    background:#0f172a;
    color:white;
}

.wrapper{
    display:flex;
}

.sidebar{
    width:250px;
    min-height:100vh;
    background:#1e293b;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}

.sidebar a:hover{
    background:#334155;
}

.main-content{
    flex:1;
    padding:20px;
}

.card{
    border-radius:20px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h3>🎮 GASM</h3>

<p style="font-size:12px;">
Game Account Security
</p>

<a href="dashboard.html">📊 Dashboard</a>

<a href="accounts.html">👤 Accounts</a>

<a href="encrypt.html">🔐 AES Encrypt</a>

<a href="hash.html"># SHA-256</a>

<a href="index.html">🚪 Logout</a>

</div>

<div class="main-content">

<h2>🔐 AES Encryption</h2>

<div class="card p-4 text-dark">

<p>
AES-256 Encryption Module
</p>

<input
id="dataInput"
class="form-control mb-3"
placeholder="Masukkan Data Akun">

<input
id="secretKey"
class="form-control mb-3"
placeholder="Masukkan Secret Key">

<button
class="btn btn-success"
onclick="encryptData()">
Encrypt Data
</button>

<hr>

<textarea
id="result"
class="form-control"
rows="6"
placeholder="Hasil Enkripsi"></textarea>

</div>

</div>

</div>

<script>

function encryptData(){

let data =
document.getElementById("dataInput").value;

let key =
document.getElementById("secretKey").value;

let encrypted =
CryptoJS.AES.encrypt(data,key).toString();

document.getElementById("result").value =
encrypted;

}

</script>

</body>
</html>
