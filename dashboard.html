<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    border:none;
    border-radius:20px;
}

.stat-card{
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<div class="container py-4">

<h1 class="mb-4">
🎮 Game Account Security Manager
</h1>

<div class="row">

<div class="col-md-4 mb-3">

<div class="card stat-card">

<h2>0</h2>

<p>Total Accounts</p>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card stat-card">

<h2>0</h2>

<p>Total Encrypt</p>

</div>

</div>

<div class="col-md-4 mb-3">

<div class="card stat-card">

<h2>0</h2>

<p>Total Hash</p>

</div>

</div>

</div>

<div class="card p-4">

<h3>Game Accounts</h3>

<table class="table">

<thead>

<tr>
<th>Username</th>
<th>Nickname</th>
<th>Level</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr>

<td>Mek</td>
<td>ShadowX</td>
<td>50</td>
<td>Encrypted</td>

</tr>

</tbody>

</table>

<button class="btn btn-primary">
Add Account
</button>

</div>

</div>

</body>
</html>
